name: Fetch Play Store Reports

on:
  schedule:
    - cron: "0 6 * * *"  # daglig kl 06 UTC
  workflow_dispatch:

jobs:
  fetch_reports:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-storage

      - name: Auth
        run: echo '${{ secrets.GPC_KEY }}' > play-api-key.json

      - name: Fetch reports
        env:
          GOOGLE_APPLICATION_CREDENTIALS: play-api-key.json
        run: python scripts/test_play_store_reports.py
