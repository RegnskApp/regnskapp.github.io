name: Fetch Play Store Installs

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      # 1. Hent repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Sett opp Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3. Installer dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-storage pandas

      # 4. Lag service account fil fra secret
      - name: Setup Google credentials
        run: echo '${{ secrets.GPC_KEY }}' > key.json

      # 5. Kjør scriptet ditt
      - name: Run Play Store script
        env:
          GOOGLE_APPLICATION_CREDENTIALS: key.json
        run: python scripts/play_store_reports.py

      # 6. Commit resultat (JSON)
      - name: Commit and push result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/play_store_history.json
          git commit -m "Update Play Store installs" || exit 0
          git push
